<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background -->
  <rect width="400" height="120" fill="#003366" rx="10"/>
  
  <!-- Icon - Thermometer/Control symbol -->
  <g transform="translate(30, 20)">
    <!-- Thermometer shape -->
    <rect x="10" y="10" width="20" height="60" rx="10" fill="#4A90E2"/>
    <rect x="15" y="50" width="10" height="20" rx="5" fill="#ffffff"/>
    <!-- Temperature lines -->
    <line x1="40" y1="20" x2="55" y2="20" stroke="#4A90E2" stroke-width="3"/>
    <line x1="40" y1="35" x2="50" y2="35" stroke="#4A90E2" stroke-width="3"/>
    <line x1="40" y1="50" x2="55" y2="50" stroke="#4A90E2" stroke-width="3"/>
    <line x1="40" y1="65" x2="50" y2="65" stroke="#4A90E2" stroke-width="3"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">TERMO</text>
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4A90E2">CONTROL</text>
  <text x="280" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">JB</text>
  
  <!-- Decorative line -->
  <line x1="100" y1="100" x2="380" y2="100" stroke="#4A90E2" stroke-width="2"/>
</svg>
